# Storybook → GitHub Pages (Actions deployment).
# Triggers on pushes to `main` only (not feature branches).
#
# Repo setup: Settings → Pages → Build and deployment → Source: GitHub Actions
# (not “Deploy from a branch”). Then push or use Actions → Run workflow.

name: Deploy Storybook to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build Storybook
        env:
          STORYBOOK_BASE_PATH: /game-controller/
        run: npm run build-storybook

      - uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          token: ${{ github.token }}
