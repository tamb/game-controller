<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>@tamb/gamecontroller</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
        line-height: 1.45;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-content: center;
        padding: 1.5rem;
        background: #f8fafc;
        color: #0f172a;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #0f172a;
          color: #e2e8f0;
        }
        .card {
          background: #1e293b;
          border-color: #334155;
        }
        a {
          color: #93c5fd;
        }
      }
      .card {
        max-width: 32rem;
        padding: 1.75rem;
        background: #fff;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgb(15 23 42 / 0.08);
      }
      h1 {
        font-size: 1.35rem;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0 0 1.25rem;
        opacity: 0.9;
      }
      ul {
        margin: 0;
        padding-left: 1.2rem;
      }
      li {
        margin: 0.5rem 0;
      }
      a {
        color: #1d4ed8;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>@tamb/gamecontroller</h1>
      <p>Gameboy-style virtual controller Web Components. Pick an interactive preview:</p>
      <ul>
        <li><a href="./storybook/index.html">Storybook</a> — component docs and playground</li>
        <li>
          <a href="./demo/index.html">Event log demo</a> — controller with a scrollable stage showing
          emitted events (newest on top)
        </li>
      </ul>
    </main>
  </body>
</html>
